name: Build HuiDash Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: public-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}

    steps:
      - name: Compute version
        id: ver
        shell: bash
        run: |
          v="0.1.${GITHUB_RUN_NUMBER}"
          tag="v${v}"
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Version: $v"

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${{ steps.ver.outputs.tag }}"
          title="HuiDash $tag"
          body=$'Automated public builder release.\nBuild material is prepared at runtime from repository data and GitHub Actions Secrets.'
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$tag" --repo "$GITHUB_REPOSITORY" --draft=true --title "$title" --notes "$body"
          else
            gh release create "$tag" --repo "$GITHUB_REPOSITORY" --draft --target "$GITHUB_SHA" --title "$title" --notes "$body"
          fi

  windows-assets:
    runs-on: windows-latest
    needs: prepare-release

    steps:
      - name: Checkout builder repo
        uses: actions/checkout@v4

      - name: Prepare source workspace
        shell: pwsh
        env:
          BUILD_BUNDLE_KEY: ${{ secrets.BUILD_BUNDLE_KEY }}
        run: |
          ./scripts/runtime.ps1 -In payload.bin -Out workspace.zip
          Expand-Archive workspace.zip -DestinationPath source -Force

      - name: Setup .NET 8 + 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Setup Java for Android signing
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install MAUI Android workload
        continue-on-error: true
        run: dotnet workload install maui-android --skip-manifest-update

      - name: Core self-test
        continue-on-error: true
        working-directory: source
        run: dotnet run --project src/DoorDash.SelfTest/DoorDash.SelfTest.csproj -c Release

      - name: Build app projects
        continue-on-error: true
        working-directory: source
        shell: pwsh
        run: |
          dotnet build src/DoorDashHui.Web/DoorDashHui.Web.csproj -c Release
          dotnet build src/DoorDashHui.RelayServer/DoorDashHui.RelayServer.csproj -c Release
          dotnet build server/DoorDashHui.SyncServer.csproj -c Release
          dotnet build src/DoorDashHui.DoordewTracker/DOORHUI.csproj -c Release

      - name: Build self-signed Android APK
        continue-on-error: true
        working-directory: source
        shell: pwsh
        run: ./scripts/android-self-signed-apk.ps1 -InstallAndroidStudio

      - name: Publish desktop app
        continue-on-error: true
        working-directory: source
        run: >
          dotnet publish src/DoorDashHui.App/DoorDashHui.App.csproj
          -c Release -r win-x64 --self-contained true
          -p:Platform=x64 -p:WindowsAppSDKSelfContained=true -p:WindowsPackageType=None
          -o publish

      - name: Build NSIS installer
        continue-on-error: true
        working-directory: source
        shell: pwsh
        run: |
          $nsis = "C:\Program Files (x86)\NSIS\makensis.exe"
          if (-not (Test-Path $nsis)) {
            choco install nsis -y --no-progress
          }
          $src = (Resolve-Path publish).Path
          $out = Join-Path (Get-Location).Path "HuiDash-Setup.exe"
          $icon = Join-Path $src "Assets\app.ico"
          & $nsis "/DVERSION=${{ needs.prepare-release.outputs.version }}" "/DSRCDIR=$src" "/DOUTFILE=$out" "/DICONFILE=$icon" installer\installer.nsi
          if ($LASTEXITCODE -ne 0) { throw "makensis failed with exit code $LASTEXITCODE" }

      - name: Upload Windows and APK assets
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          if (Test-Path source/HuiDash-Setup.exe) {
            Copy-Item source/HuiDash-Setup.exe release-assets/
          }
          Get-ChildItem source/src/DoorDashHui.Mobile/bin/Release/net10.0-android -Recurse -Filter *.apk -ErrorAction SilentlyContinue |
            Sort-Object FullName -Unique |
            ForEach-Object {
              $target = Join-Path release-assets $_.Name
              if (Test-Path $target) {
                $target = Join-Path release-assets ("{0}-{1}{2}" -f $_.BaseName, $_.Directory.Name, $_.Extension)
              }
              Copy-Item $_.FullName $target
            }
          $files = @(Get-ChildItem release-assets -File -ErrorAction SilentlyContinue)
          if ($files.Count -eq 0) {
            Write-Warning "No Windows/APK release assets found."
            exit 0
          }
          gh release upload "${{ needs.prepare-release.outputs.tag }}" @($files.FullName) --repo "$env:GITHUB_REPOSITORY" --clobber

  docker-assets:
    runs-on: ubuntu-latest
    needs: prepare-release

    steps:
      - name: Checkout builder repo
        uses: actions/checkout@v4

      - name: Prepare source workspace
        shell: pwsh
        env:
          BUILD_BUNDLE_KEY: ${{ secrets.BUILD_BUNDLE_KEY }}
        run: |
          ./scripts/runtime.ps1 -In payload.bin -Out workspace.zip
          Expand-Archive workspace.zip -DestinationPath source -Force

      - name: Build and upload Docker image archives
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -u
          cd source
          v="${{ needs.prepare-release.outputs.version }}"
          mkdir -p ../release-assets
          docker build -f src/DoorDashHui.RelayServer/Dockerfile -t huidash-relay:${v} .
          docker build -f src/DoorDashHui.DoordewTracker/Dockerfile -t doorhui:${v} src/DoorDashHui.DoordewTracker
          docker build -f src/DoorDashHui.DoordewTracker/Dockerfile-OWNIP -t doorhui-ownip:${v} src/DoorDashHui.DoordewTracker
          docker save huidash-relay:${v} | gzip -9 > ../release-assets/huidash-relay-${v}.docker.tar.gz
          docker save doorhui:${v} | gzip -9 > ../release-assets/doorhui-${v}.docker.tar.gz
          docker save doorhui-ownip:${v} | gzip -9 > ../release-assets/doorhui-ownip-${v}.docker.tar.gz
          cd ..
          shopt -s nullglob
          files=(release-assets/*)
          if (( ${#files[@]} == 0 )); then
            echo "No Docker release assets found."
            exit 0
          fi
          gh release upload "${{ needs.prepare-release.outputs.tag }}" "${files[@]}" --repo "$GITHUB_REPOSITORY" --clobber

  publish-release:
    runs-on: ubuntu-latest
    needs: [prepare-release, windows-assets, docker-assets]

    steps:
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh release edit "${{ needs.prepare-release.outputs.tag }}" --repo "$GITHUB_REPOSITORY" --draft=false --latest
